<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>FlowKeep — A rhythm was shared with you</title>

    <meta property="og:title" content="A rhythm was shared with you">
    <meta property="og:description" content="Open this rhythm in FlowKeep to stay consistent.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="FlowKeep">
    <meta name="twitter:card" content="summary">
    <meta name="theme-color" content="#1C1A17">

    <style>
        :root {
            --bg: #1C1A17;
            --surface: #24211D;
            --primary: #FFFFFF;
            --secondary: rgba(255, 255, 255, 0.5);
            --separator: rgba(255, 255, 255, 0.08);
            --accent: #D4893A;
            --accent-fill: rgba(212, 137, 58, 0.2);
            --terracotta: #D59367;
            --periwinkle: #A5A8C0;
            --sage: #789E96;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            color: var(--primary);
            padding: 24px 20px 40px;
        }

        .page {
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.45s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Brand lockup */
        .lockup {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logomark {
            position: relative;
            width: 40px;
            height: 22px;
        }

        .logomark span {
            position: absolute;
            top: 0;
            width: 22px;
            height: 22px;
            border-radius: 50%;
        }

        .logomark .c1 { left: 0; background: var(--terracotta); }
        .logomark .c2 { left: 9px; background: var(--periwinkle); }
        .logomark .c3 { left: 18px; background: var(--sage); }

        .wordmark {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .intro {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 22px;
            line-height: 1.3;
        }

        /* Rhythm card */
        .card {
            position: relative;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--separator);
            border-radius: 24px;
            padding: 28px 26px 30px;
            text-align: left;
            margin-bottom: 28px;
        }

        .card-circles {
            position: absolute;
            top: 0;
            right: 0;
            width: 200px;
            height: 200px;
            pointer-events: none;
        }

        .card-circles span {
            position: absolute;
            border-radius: 50%;
            opacity: 0.06;
        }

        .card-circles .b1 { width: 150px; height: 150px; top: -40px; right: -30px; background: var(--terracotta); }
        .card-circles .b2 { width: 110px; height: 110px; top: 10px; right: 8px; background: var(--periwinkle); }
        .card-circles .b3 { width: 80px; height: 80px; top: -10px; right: 40px; background: var(--sage); }

        .card-header {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 26px;
        }

        .card-lockup {
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .card-lockup .logomark { width: 26px; height: 14px; }
        .card-lockup .logomark span { width: 14px; height: 14px; }
        .card-lockup .logomark .c2 { left: 6px; }
        .card-lockup .logomark .c3 { left: 12px; }
        .card-lockup .wordmark { font-size: 14px; }

        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--accent);
            background: var(--accent-fill);
            padding: 5px 13px;
            border-radius: 999px;
        }

        .card-title {
            position: relative;
            font-size: 38px;
            font-weight: 800;
            line-height: 1.05;
            margin-bottom: 12px;
        }

        .card-rhythm {
            position: relative;
            font-size: 17px;
            color: var(--secondary);
        }

        /* Buttons */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 18px;
        }

        .button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 16px 24px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .button:active { transform: scale(0.98); }

        .button-primary { background: var(--accent); color: #1C1A17; }
        .button-secondary {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--separator);
        }

        #status {
            font-size: 13px;
            color: var(--secondary);
            min-height: 18px;
            margin-bottom: 4px;
        }

        .footer {
            margin-top: 28px;
            font-size: 13px;
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="lockup">
            <span class="logomark"><span class="c1"></span><span class="c2"></span><span class="c3"></span></span>
            <span class="wordmark">FlowKeep</span>
        </div>

        <p class="intro">A rhythm was shared with you</p>

        <div class="card">
            <div class="card-circles"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>
            <div class="card-header">
                <span class="card-lockup">
                    <span class="logomark"><span class="c1"></span><span class="c2"></span><span class="c3"></span></span>
                    <span class="wordmark">FlowKeep</span>
                </span>
                <span class="badge" id="badge">DOING</span>
            </div>
            <div class="card-title" id="cardTitle">FlowKeep Rhythm</div>
            <div class="card-rhythm" id="cardRhythm">A project rhythm ready to import</div>
        </div>

        <div class="actions">
            <button class="button button-primary" id="openApp" onclick="attemptOpenApp()">Open in App</button>
            <a class="button button-secondary" href="https://apps.apple.com/search?term=FlowKeep" id="downloadLink">Download FlowKeep</a>
        </div>

        <p id="status"></p>

        <div class="footer">Shared via FlowKeep</div>
    </div>

    <script>
        const APP_STORE_URL = 'https://apps.apple.com/search?term=FlowKeep';
        const urlParams = new URLSearchParams(window.location.search);
        const templateDataEncoded = urlParams.get('data');

        let templateData = null;
        let appOpened = false;

        if (templateDataEncoded) {
            try {
                templateData = JSON.parse(atob(templateDataEncoded));
            } catch (e) {
                console.error('Error decoding rhythm:', e);
            }
        }

        if (templateData) {
            const title = templateData.name || 'FlowKeep Rhythm';
            document.getElementById('cardTitle').textContent = title;

            const isLearning = templateData.type === 'learning';
            document.getElementById('badge').textContent = isLearning ? 'LEARNING' : 'DOING';
            document.title = title + ' — FlowKeep';

            const duration = parseInt(templateData.duration, 10);
            const frequency = parseInt(templateData.frequency, 10);
            if (!isNaN(duration) && !isNaN(frequency)) {
                document.getElementById('cardRhythm').textContent =
                    duration + ' min · every ' + frequency + ' days';
            }
        }

        const appURL = templateDataEncoded
            ? 'flowkeep://template?data=' + encodeURIComponent(templateDataEncoded)
            : 'flowkeep://';

        window.onload = function() {
            if (templateDataEncoded) {
                attemptOpenApp();
            } else {
                document.getElementById('status').textContent = 'No rhythm data in this link.';
            }
        };

        function attemptOpenApp() {
            if (!templateDataEncoded) return;
            window.location = appURL;
            appOpened = true;
            document.getElementById('status').textContent = 'Opening FlowKeep…';

            setTimeout(function() {
                if (!document.hidden) {
                    document.getElementById('status').textContent = "Don't have the app yet?";
                }
            }, 1800);
        }

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) { appOpened = true; }
        });

        window.addEventListener('beforeunload', function() {
            appOpened = true;
        });
    </script>
</body>
</html>
